version: '3.8'

services:
  # db:
  #   image: mysql:8.0
  #   container_name: attendance_db
  #   restart: always
  #   environment:
  #     MYSQL_ROOT_PASSWORD: password
  #     MYSQL_DATABASE: attendance_tracker
  #     MYSQL_USER: user
  #     MYSQL_PASSWORD: password
  #   ports:
  #     - "3306:3306"
  #   volumes:
  #     - mysql_data:/var/lib/mysql

  db:
    image: mysql:8.0
    container_name: attendance_db
    restart: always
    command: --default-authentication-plugin=mysql_native_password --skip-ssl --port=3306
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: attendance_tracker
      MYSQL_USER: user
      MYSQL_PASSWORD: userpassword
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_TCP_PORT: 3306
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql


  app:
    build: .
    container_name: attendance_app
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://user:userpassword@db/attendance_tracker
    depends_on:
      - db
    volumes:
      - .:/app
    command: ["./wait-for-db.sh", "db", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

volumes:
  mysql_data:
