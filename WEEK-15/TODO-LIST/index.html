<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/output.css">
    <title>My Todo List</title>
</head>
<body class="bg-blue-950">
    <main>
        <div class="w-[560px] h-[280px] border border-black mx-auto mt-44 rounded-2xl bg-gray-400">

            <div class=" flex justify-center mx-auto mt-5">
                <h1 class="text-4xl font-bold font-serif">My Todo List</h1>
            </div>

            <div class="flex items-center mx-auto gap-5">

                <div class="ml-10">
                    <input id="todo-input" class="w-80 h-14 border mt-8 border-black bg-white rounded-lg pl-2" type="text" placeholder="Enter task">
                </div>

                <div id="click" class="w-16 h-14 mt-8 border border-black bg-blue-950 rounded-lg text-white font-bold flex items-center justify-center">
                    <button id="add-btn" class=" cursor-pointer">Add</button>
                </div>

            </div>

            <ul id="todo-list">

            </ul>
        </div>
    </main>

    <script src="main.js">

    </script>
</body>
</html>
