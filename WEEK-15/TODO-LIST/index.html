<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/output.css">
    <title>My Todo List</title>
</head>
<body class="bg-blue-950">
    <main>
        <div class="w-[560px] h-[540px] border border-black mx-auto mt-44 rounded-2xl bg-gray-400">

            <div class=" flex justify-center mx-auto mt-5">
                <h1 class="text-4xl font-bold font-serif">My Todo List</h1>
            </div>

            <div class="flex items-center mx-auto">

                <div class="mx-auto">
                    <input id="task" class="w-60 h-10 border mt-8 border-black bg-white rounded-lg" type="text" placeholder="Enter task">
                </div>

                <div id="click" class="w-10 mx-auto h-10 mt-8 border border-black rounded-lg bg-white">
                    <button onclick="addTodo()" class="flex items-center mt-2 ml-1 cursor-pointer">Add</button>
                </div>

            </div>

            <div class="w-[430px] h-[300px] border mx-auto mt-10 border-black rounded-2xl bg-white">
                
            </div>

        </div>
    </main>
</body>
</html>
